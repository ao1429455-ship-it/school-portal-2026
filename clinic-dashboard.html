<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العيادة المدرسية الرقمية | مدرسة جمال عبدالناصر</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://school-platform-f9f4a-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
    </script>

    <style>#clinic { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
.clinic-container { width: 95%; max-width: 900px; margin: 30px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

    /* تنسيق حقول الإدخال */
    .input-box { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; transition: 0.3s; font-size: 15px; }
    .input-box:focus { border-color: ##bfffea; outline: none; box-shadow: 0 0 8px rgba(0,123,255,0.2); }

    /* تنسيق حاوية الأزرار */
    .btn-group { display: flex; gap: 15px; margin-top: 20px; }

    /* تنسيق الأزرار (Buttons) */
    .btn { padding: 14px 20px; border: none; border-radius: 12px; cursor: pointer; color: white; font-weight: bold; font-size: 15px; flex: 1; transition: 0.4s; display: flex; justify-content: center; align-items: center; }
    
    /* زر الحفظ */
    .btn-save { background-color: #007bff; }
    .btn-save:hover { background-color: #0056b3; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,123,255,0.3); }

    /* زر الواتساب */
    .btn-wa { background-color: #25d366; }
    .btn-wa:hover { background-color: #128c7e; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37,211,102,0.3); }

    /* تنسيق صندوق الحالة */
    .status-box { background: #f8fafc; padding: 25px; border-radius: 15px; margin-top: 20px; border-right: 5px solid #007bff; display: none; }
    
    h1 { text-align: center; color: #0b1c3d; margin-bottom: 30px; }
</style>
    
</head>
<body id="clinic">

<div class="clinic-container">
    <h1 style="color: #007bff;">🩺 العيادة المدرسية - لوحة تحكم الطبيب</h1>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        
        <div>
            <input type="text" id="searchCode" class="input-box" placeholder="ادخل كود الطالب للبحث..." oninput="fetchStudentData()">
            <div id="studentInfo" class="status-box">
                <h3 id="displayName">اسم الطالب: -</h3>
                <input type="text" id="bloodType" class="input-box" placeholder="فصيلة الدم">
                <input type="text" id="allergies" class="input-box" placeholder="الحساسية">
                <input type="text" id="chronic" class="input-box" placeholder="أمراض مزمنة">
                <button class="btn btn-save" onclick="updateHealthRecord()">حفظ التعديلات</button>
                <button class="btn btn-wa" onclick="sendHealthReport()">إرسال تقرير واتساب 💬</button>
            </div>
        </div>
        
        
        <div style="background: #f8f9fa; padding: 20px; border-radius: 10px;">
            <h3>تعليمات الاستخدام:</h3>
            <p>1. أدخل كود الطالب في خانة البحث.</p>
            <p>2. ستظهر بيانات الطالب تلقائياً إذا كان مسجلاً.</p>
            <p>3. قم بتعديل البيانات الصحية ثم اضغط حفظ.</p>
            <p>4. يمكنك إرسال تقرير فوري لولي الأمر عبر زر واتساب.</p>
        </div>
    </div>
    
</div>
<div class="clinic-container">
    <!-- زر الرجوع -->
    <a href="index.html" class="back-btn">← العودة للرئيسية</a>
    
   
    <!-- باقي المحتوى الخاص بك -->
</div>

       
       

<script>
    
    if (localStorage.getItem('userRole') !== 'doctor') {
        window.location.href = 'login.html';
    } else {
        document.body.style.display = 'block';
    }

  
    function fetchStudentData() {
        const code = document.getElementById('searchCode').value;
        if (code.length > 2) {
            database.ref('students/' + code).once('value', function(snap) {
                if (snap.exists()) {
                    const s = snap.val();
                    document.getElementById('studentInfo').style.display = 'block';
                    document.getElementById('displayName').innerText = "الطالب: " + s.name;
                    
                    
                    const record = s.healthRecord || {};
                    document.getElementById('bloodType').value = record.bloodType || "";
                    document.getElementById('allergies').value = record.allergies || "";
                    document.getElementById('chronic').value = record.chronic || "";
                }
            });
        }
    }

    
    function updateHealthRecord() {
        const code = document.getElementById('searchCode').value;
        const data = {
            bloodType: document.getElementById('bloodType').value,
            allergies: document.getElementById('allergies').value,
            chronic: document.getElementById('chronic').value
        };
        database.ref('students/' + code + '/healthRecord').update(data)
            .then(function() {
                alert("تم تحديث السجل الطبي بنجاح!");
            });
    }

   
    function sendHealthReport() {
        const code = document.getElementById('searchCode').value;
        database.ref('students/' + code).once('value', function(snap) {
            if (snap.exists()) {
                const s = snap.val();
                const blood = document.getElementById('bloodType').value;
                const allergy = document.getElementById('allergies').value;
                const chronic = document.getElementById('chronic').value;

               
                const msg = "مرحباً ولي أمر الطالب " + s.name + "، تقرير العيادة: فصيلة الدم: " + blood + "، الحساسية: " + allergy + "، الملاحظات: " + chronic + ".";
                
                
                const whatsappNumber = s.whatsapp || '201221493125';
                window.open("https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(msg), "_blank");
            }
        });
    }
</script>






</body>
</html>
